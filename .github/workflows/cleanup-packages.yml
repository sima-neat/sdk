name: Cleanup GHCR Packages

on:
  schedule:
    - cron: "23 9 * * *"
  delete:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Show what would be deleted without deleting packages"
        required: false
        default: false
        type: boolean
      branch_name:
        description: "Optional deleted branch name to clean up directly"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Cleanup branch SDK packages
    runs-on: ubuntu-24.04
    steps:
      - name: Cleanup GHCR package versions
        uses: actions/github-script@v8
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          REQUESTED_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch_name || '' }}
          DELETED_REF: ${{ github.event_name == 'delete' && github.event.ref || '' }}
          DELETED_REF_TYPE: ${{ github.event_name == 'delete' && github.event.ref_type || '' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const dryRun = String(process.env.DRY_RUN).toLowerCase() === 'true';
            const requestedBranch = String(process.env.REQUESTED_BRANCH || '').trim();
            const deletedRef = String(process.env.DELETED_REF || '').trim();
            const deletedRefType = String(process.env.DELETED_REF_TYPE || '').trim();
            const buildWorkflowFile = 'docker-build.yml';
            const workflowRunPageLimit = 50;

            const protectedBranchNames = new Set(['develop', 'main']);

            function branchSlug(branchName) {
              let branch = branchName.toLowerCase();
              branch = branch
                .replace(/[^a-z0-9._-]+/g, '-')
                .replace(/^-+/, '')
                .replace(/-+$/, '')
                .replace(/-{2,}/g, '-');
              if (!branch) {
                branch = 'branch';
              }
              return branch;
            }

            function sdkPackageForBranch(branchName) {
              const branch = branchSlug(branchName);
              return `sdk-${branch}`;
            }

            function isReleaseOrInfrastructureTag(tag) {
              return (
                tag === 'latest' ||
                tag === 'staged-latest' ||
                /^v[0-9]+[.][0-9]+[.][0-9]+([.][0-9]+)?$/.test(tag) ||
                /^v[0-9]+[.][0-9]+-latest$/.test(tag) ||
                /^[0-9a-f]{40}$/.test(tag) ||
                /^staged-[0-9a-f]{40}$/.test(tag) ||
                /^[0-9a-f]{40}-(x86_64|aarch64)$/.test(tag)
              );
            }

            function isBranchTag(tag, liveBranchSlugs) {
              if (isReleaseOrInfrastructureTag(tag)) {
                return false;
              }
              return !liveBranchSlugs.has(tag);
            }

            function cacheBranchSlug(tag) {
              const match = tag.match(/^(.*)-(x86_64|aarch64)$/);
              return match ? match[1] : '';
            }

            async function paginate(route, parameters) {
              return github.paginate(route, {
                per_page: 100,
                ...parameters,
              });
            }

            function packageRepositoryFullName(pkg) {
              if (pkg.repository?.full_name) {
                return pkg.repository.full_name;
              }
              const repoOwner = pkg.repository?.owner?.login;
              const repoName = pkg.repository?.name;
              if (repoOwner && repoName) {
                return `${repoOwner}/${repoName}`;
              }
              return '';
            }

            async function getPackage(packageName) {
              try {
                const response = await github.request('GET /orgs/{org}/packages/{package_type}/{package_name}', {
                  org: owner,
                  package_type: 'container',
                  package_name: packageName,
                });
                return response.data;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            async function packageHasSdkWorkflowVersion(packageName, commitShas) {
              if (!commitShas || commitShas.size === 0) {
                return false;
              }

              const expectedTags = new Set();
              for (const sha of commitShas) {
                expectedTags.add(sha);
                expectedTags.add(`staged-${sha}`);
                expectedTags.add(`${sha}-x86_64`);
                expectedTags.add(`${sha}-aarch64`);
              }

              const versions = await paginate(
                'GET /orgs/{org}/packages/{package_type}/{package_name}/versions',
                {
                  org: owner,
                  package_type: 'container',
                  package_name: packageName,
                },
              );

              for (const version of versions) {
                const tags = version.metadata?.container?.tags ?? [];
                if (tags.some((tag) => expectedTags.has(tag))) {
                  return true;
                }
              }
              return false;
            }

            async function deletePackage(packageName, commitShas = new Set()) {
              const pkg = await getPackage(packageName);
              if (!pkg) {
                core.info(`${packageName}: package does not exist; nothing to delete.`);
                return;
              }

              const packageRepo = packageRepositoryFullName(pkg);
              if (packageRepo && packageRepo !== repoFullName) {
                core.warning(
                  `${packageName}: skipping package associated with ${packageRepo}; ` +
                  `expected ${repoFullName}.`,
                );
                return;
              }

              if (!packageRepo) {
                const hasSdkWorkflowVersion = await packageHasSdkWorkflowVersion(packageName, commitShas);
                if (!hasSdkWorkflowVersion) {
                  core.warning(
                    `${packageName}: skipping package with unknown repository ownership because no version tags ` +
                    `matched SDK workflow commit history.`,
                  );
                  return;
                }
                core.warning(
                  `${packageName}: package repository metadata is unavailable; proceeding because version tags ` +
                  `match SDK workflow commit history.`,
                );
              }

              if (dryRun) {
                core.info(`[dry-run] would delete package ${packageName}`);
                return;
              }

              await github.request('DELETE /orgs/{org}/packages/{package_type}/{package_name}', {
                org: owner,
                package_type: 'container',
                package_name: packageName,
              });
              core.info(`Deleted package ${packageName}`);
            }

            async function deletePackageVersion(packageName, version) {
              const tags = version.metadata?.container?.tags ?? [];
              if (dryRun) {
                core.info(`[dry-run] would delete ${packageName} version ${version.id} tags=[${tags.join(', ')}]`);
                return;
              }
              await github.request('DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}', {
                org: owner,
                package_type: 'container',
                package_name: packageName,
                package_version_id: version.id,
              });
              core.info(`Deleted ${packageName} version ${version.id} tags=[${tags.join(', ')}]`);
            }

            async function packageExists(packageName) {
              try {
                await github.request('GET /orgs/{org}/packages/{package_type}/{package_name}', {
                  org: owner,
                  package_type: 'container',
                  package_name: packageName,
                });
                return true;
              } catch (error) {
                if (error.status === 404) {
                  return false;
                }
                throw error;
              }
            }

            async function listWorkflowRunsForBuildWorkflow() {
              const runs = [];
              for (let page = 1; page <= workflowRunPageLimit; page += 1) {
                const response = await github.request(
                  'GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs',
                  {
                    owner,
                    repo,
                    workflow_id: buildWorkflowFile,
                    per_page: 100,
                    page,
                  },
                );
                const pageRuns = response.data.workflow_runs ?? [];
                runs.push(...pageRuns);
                if (pageRuns.length < 100) {
                  break;
                }
              }
              return runs;
            }

            function shouldTrackBranchPackageFromRun(run) {
              if (!run.head_branch) {
                return false;
              }
              if (!['push', 'pull_request', 'workflow_dispatch'].includes(run.event)) {
                return false;
              }
              if (run.head_branch.startsWith('v') && /^v[0-9]/.test(run.head_branch)) {
                return false;
              }
              return true;
            }

            const branches = await paginate('GET /repos/{owner}/{repo}/branches', {
              owner,
              repo,
            });
            const branchPackages = new Set();
            const protectedBranchPackages = new Set();
            const branchSlugs = new Set();

            for (const branch of branches) {
              const slug = branchSlug(branch.name);
              const packageName = sdkPackageForBranch(branch.name);
              branchSlugs.add(slug);
              branchPackages.add(packageName);
              if (branch.protected || protectedBranchNames.has(branch.name)) {
                protectedBranchPackages.add(packageName);
              }
            }

            core.info(`Found ${branches.length} branch(es).`);
            core.info(`Found ${protectedBranchPackages.size} protected branch package name(s).`);

            const sdkBranchPackages = new Map();
            function addSdkBranchPackage(branchName, commitSha = '') {
              const packageName = sdkPackageForBranch(branchName);
              if (!sdkBranchPackages.has(packageName)) {
                sdkBranchPackages.set(packageName, new Set());
              }
              if (commitSha) {
                sdkBranchPackages.get(packageName).add(commitSha);
              }
              return packageName;
            }

            if (requestedBranch) {
              addSdkBranchPackage(requestedBranch);
              core.info(`Added requested branch package candidate for ${requestedBranch}.`);
            }
            if (deletedRef && deletedRefType === 'branch') {
              addSdkBranchPackage(deletedRef);
              core.info(`Added deleted branch package candidate for ${deletedRef}.`);
            } else if (deletedRef && deletedRefType) {
              core.info(`Delete event was for ${deletedRefType} ${deletedRef}; skipping direct branch package cleanup.`);
            }

            if (!requestedBranch && context.eventName !== 'delete') {
              const workflowRuns = await listWorkflowRunsForBuildWorkflow();
              core.info(`Scanned ${workflowRuns.length} ${buildWorkflowFile} workflow run(s).`);
              for (const run of workflowRuns) {
                if (shouldTrackBranchPackageFromRun(run)) {
                  addSdkBranchPackage(run.head_branch, run.head_sha || '');
                }
              }
            }

            core.info(`Found ${sdkBranchPackages.size} SDK branch package candidate(s).`);

            for (const [packageName, commitShas] of sdkBranchPackages) {
              if (!branchPackages.has(packageName)) {
                core.info(`${packageName}: no matching branch; deleting entire package.`);
                await deletePackage(packageName, commitShas);
                continue;
              }

              if (protectedBranchPackages.has(packageName)) {
                core.info(`${packageName}: matching branch is protected; keeping all versions.`);
                continue;
              }

              core.info(`${packageName}: matching branch still exists; keeping package and all versions.`);
            }

            if (!(await packageExists('sdk'))) {
              core.info('sdk: canonical package does not exist; skipping canonical branch-tag cleanup.');
            } else {
              const versions = await paginate(
                'GET /orgs/{org}/packages/{package_type}/{package_name}/versions',
                {
                  org: owner,
                  package_type: 'container',
                  package_name: 'sdk',
                },
              );
              let deletedCanonical = 0;
              let keptCanonical = 0;
              let skippedCanonical = 0;
              for (const version of versions) {
                const tags = version.metadata?.container?.tags ?? [];
                const deletedBranchTags = tags.filter((tag) => isBranchTag(tag, branchSlugs));
                if (deletedBranchTags.length === 0) {
                  keptCanonical += 1;
                  continue;
                }

                const retainedTags = tags.filter((tag) => !deletedBranchTags.includes(tag));
                if (retainedTags.length > 0) {
                  skippedCanonical += 1;
                  core.warning(
                    `sdk: version ${version.id} has deleted-branch tag(s) [${deletedBranchTags.join(', ')}] ` +
                    `but also retained tag(s) [${retainedTags.join(', ')}]; keeping the version because GHCR deletes versions, not individual tags.`,
                  );
                  continue;
                }

                await deletePackageVersion('sdk', version);
                deletedCanonical += 1;
              }
              core.info(
                `sdk: deleted ${deletedCanonical} deleted-branch-only version(s), ` +
                `kept ${keptCanonical} version(s), skipped ${skippedCanonical} mixed-tag version(s).`,
              );
            }

            if (!(await packageExists('sdk-buildcache'))) {
              core.info('sdk-buildcache: package does not exist; skipping cache cleanup.');
            } else {
              const versions = await paginate(
                'GET /orgs/{org}/packages/{package_type}/{package_name}/versions',
                {
                  org: owner,
                  package_type: 'container',
                  package_name: 'sdk-buildcache',
                },
              );
              const untaggedRetentionMs = 7 * 24 * 60 * 60 * 1000;
              const untaggedCutoff = Date.now() - untaggedRetentionMs;
              let deletedCache = 0;
              let keptCache = 0;
              let skippedCache = 0;

              for (const version of versions) {
                const tags = version.metadata?.container?.tags ?? [];
                if (tags.length === 0) {
                  const updatedAt = Date.parse(version.updated_at || version.created_at || '');
                  if (Number.isFinite(updatedAt) && updatedAt < untaggedCutoff) {
                    await deletePackageVersion('sdk-buildcache', version);
                    deletedCache += 1;
                  } else {
                    keptCache += 1;
                  }
                  continue;
                }

                const deletedBranchTags = tags.filter((tag) => {
                  const slug = cacheBranchSlug(tag);
                  return slug && !branchSlugs.has(slug);
                });
                if (deletedBranchTags.length === 0) {
                  keptCache += 1;
                  continue;
                }

                const retainedTags = tags.filter((tag) => !deletedBranchTags.includes(tag));
                if (retainedTags.length > 0) {
                  skippedCache += 1;
                  core.warning(
                    `sdk-buildcache: version ${version.id} has deleted-branch cache tag(s) ` +
                    `[${deletedBranchTags.join(', ')}] but also retained tag(s) ` +
                    `[${retainedTags.join(', ')}]; keeping the version.`,
                  );
                  continue;
                }

                await deletePackageVersion('sdk-buildcache', version);
                deletedCache += 1;
              }

              core.info(
                `sdk-buildcache: deleted ${deletedCache} stale version(s), ` +
                `kept ${keptCache} version(s), skipped ${skippedCache} mixed-tag version(s).`,
              );
            }
