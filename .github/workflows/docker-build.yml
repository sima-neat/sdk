name: Build SDK Docker Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
            platform: linux/amd64
            image_suffix: x86_64
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
            platform: linux/arm64
            image_suffix: aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run SDK build and package tests
        run: |
          tests/sdk/test-install-sdk-stub.sh
          tests/sdk/test-neat-deps.sh
          tests/sdk/test-build-script.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image name
        id: image
        env:
          IMAGE_SUFFIX: ${{ matrix.image_suffix }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/tags/v* ]]; then
            repo="sdk"
          else
            branch="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')"
            branch="$(echo "${branch}" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
            if [[ -z "${branch}" ]]; then
              branch="branch"
            fi
            repo="sdk-${branch}"
          fi
          echo "name=ghcr.io/${owner}/${repo}" >> "${GITHUB_OUTPUT}"

          cache_ref_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            # Fork PRs can consume only the trusted develop cache. Same-repository
            # PRs may additionally consume the cache previously written by their
            # source branch, while remaining read-only below.
            cache_ref_name="develop"
            if [[ "${PR_HEAD_REPOSITORY:-}" == "${GITHUB_REPOSITORY}" &&
                  -n "${GITHUB_HEAD_REF:-}" ]]; then
              cache_ref_name="${GITHUB_HEAD_REF}"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]] &&
               [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)[.]([0-9]+)[.] ]]; then
            cache_ref_name="release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          fi
          cache_scope="$(echo "${cache_ref_name}" | tr '[:upper:]' '[:lower:]')"
          cache_scope="$(echo "${cache_scope}" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
          if [[ -z "${cache_scope}" ]]; then
            cache_scope="branch"
          fi
          cache_ref="ghcr.io/${owner}/sdk-buildcache:${cache_scope}-${IMAGE_SUFFIX}"
          base_cache_ref="ghcr.io/${owner}/sdk-buildcache:develop-${IMAGE_SUFFIX}"
          echo "cache_ref=${cache_ref}" >> "${GITHUB_OUTPUT}"
          if [[ "${cache_ref}" == "${base_cache_ref}" ]]; then
            echo "cache_from=${cache_ref}" >> "${GITHUB_OUTPUT}"
          else
            echo "cache_from=${cache_ref} ${base_cache_ref}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          set -euo pipefail

          export BUILDX_CACHE_FROM="${CACHE_FROM}"
          export BUILDX_PROVENANCE=false

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export BUILDX_OUTPUT=load
            ./build.sh sdk "ci-${IMAGE_SUFFIX}"
          else
            export BUILDX_OUTPUT=push
            if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
              export BUILDX_CACHE_TO="${CACHE_REF}"
            fi
            ./build.sh "${IMAGE_NAME}" "${GITHUB_SHA}-${IMAGE_SUFFIX}"
          fi
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_SUFFIX: ${{ matrix.image_suffix }}
          CACHE_REF: ${{ steps.image.outputs.cache_ref }}
          CACHE_FROM: ${{ steps.image.outputs.cache_from }}
          DOCKER_PLATFORM: ${{ matrix.platform }}

  publish-manifest:
    name: Publish multi-arch manifest
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/tags/v* ]]; then
            repo="sdk"
          else
            branch="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')"
            branch="$(echo "${branch}" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
            if [[ -z "${branch}" ]]; then
              branch="branch"
            fi
            repo="sdk-${branch}"
          fi
          echo "name=ghcr.io/${owner}/${repo}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:staged-${GITHUB_SHA}" \
            "${IMAGE_NAME}:${GITHUB_SHA}-x86_64" \
            "${IMAGE_NAME}:${GITHUB_SHA}-aarch64"
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}

      - name: Write image promotion metadata
        run: |
          set -euo pipefail

          mkdir -p image-metadata

          release_tag=""
          release_latest_tag=""
          branch_tag=""
          promote_latest=false
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            if [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)[.]([0-9]+)[.][0-9]+([.][0-9]+)?$ ]]; then
              release_latest_tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}-latest"
              release_line_ref="release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            else
              echo "Release tags must use vX.Y.Z or vX.Y.Z.N format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            promote_latest=true
            branch_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')"
            branch_tag="$(echo "${branch_tag}" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
            if [[ -z "${branch_tag}" ]]; then
              branch_tag="branch"
            fi
          fi

          {
            echo "repository=${IMAGE_NAME}"
            echo "source_ref=${IMAGE_NAME}:staged-${GITHUB_SHA}"
            echo "staged_tag=staged-${GITHUB_SHA}"
            echo "commit_sha=${GITHUB_SHA}"
            echo "release_tag=${release_tag}"
            echo "release_latest_tag=${release_latest_tag}"
            echo "release_line_ref=${release_line_ref:-}"
            echo "branch_tag=${branch_tag}"
            echo "promote_latest=${promote_latest}"
          } > image-metadata/image.env
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}

      - name: Upload image promotion metadata
        uses: actions/upload-artifact@v7
        with:
          name: image-promotion-metadata
          path: image-metadata/image.env
          if-no-files-found: error

  smoke:
    name: Smoke on ${{ matrix.arch }}
    if: github.event_name != 'pull_request'
    needs: publish-manifest
    runs-on: ${{ matrix.runs_on }}
    env:
      SIMA_CLI_CHECK_FOR_UPDATE: "0"
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-amd64
            runs_on: ubuntu-24.04
            docker_arch: amd64
          - arch: linux-arm64
            runs_on: ubuntu-24.04-arm
            docker_arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare macOS Docker CLI
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          docker_paths=(
            "/Applications/Docker.app/Contents/Resources/bin"
            "${HOME}/.docker/bin"
            "/opt/homebrew/bin"
            "/usr/local/bin"
          )

          for path in "${docker_paths[@]}"; do
            if [[ -x "${path}/docker" ]]; then
              echo "${path}" >> "${GITHUB_PATH}"
              export PATH="${path}:${PATH}"
              break
            fi
          done

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker CLI is not available on the macOS smoke runner PATH." >&2
            echo "Install Docker CLI or add it to one of: ${docker_paths[*]}" >&2
            exit 1
          fi

          docker version --format '{{.Client.Version}}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download image metadata
        uses: actions/download-artifact@v7
        with:
          name: image-promotion-metadata
          path: .smoke

      - name: Compute image under test
        id: image
        run: |
          set -euo pipefail

          metadata_file="$(find .smoke -type f -name image.env -print -quit)"
          # shellcheck disable=SC1090
          source "${metadata_file}"

          repository="${repository:?}"
          tag="${staged_tag:?}"
          image_ref="${repository}:${tag}"
          install_spec="ghcr:${repository#ghcr.io/}:${tag}"

          {
            echo "repository=${repository}"
            echo "tag=${tag}"
            echo "image_ref=${image_ref}"
            echo "install_spec=${install_spec}"
          } >> "${GITHUB_OUTPUT}"

          echo "Testing ${image_ref}"

      - name: Wait for published image
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            if docker buildx version >/dev/null 2>&1; then
              inspect_cmd=(docker buildx imagetools inspect "${IMAGE_REF}")
            else
              inspect_cmd=(docker manifest inspect "${IMAGE_REF}")
            fi

            if "${inspect_cmd[@]}" >/dev/null 2>&1; then
              "${inspect_cmd[@]}"
              exit 0
            fi
            echo "Image manifest not visible yet (${attempt}/12): ${IMAGE_REF}"
            sleep 10
          done

          echo "Image manifest was not found: ${IMAGE_REF}" >&2
          exit 1

      - name: Install sima-cli
        run: |
          set -euo pipefail

          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install sima-cli
          sima-cli --version

      - name: Configure sima-cli access token
        env:
          SIMA_CLI_ACCESS_TOKEN_FILE: ${{ secrets.SIMA_CLI_ACCESS_TOKEN_FILE }}
        run: |
          set -euo pipefail
          set +x

          if [[ -z "${SIMA_CLI_ACCESS_TOKEN_FILE}" ]]; then
            echo "SIMA_CLI_ACCESS_TOKEN_FILE secret is not configured." >&2
            exit 1
          fi

          echo "::add-mask::${SIMA_CLI_ACCESS_TOKEN_FILE}"
          install -m 700 -d "${HOME}/.sima-cli"
          umask 077
          printf '%s' "${SIMA_CLI_ACCESS_TOKEN_FILE}" > "${HOME}/.sima-cli/.tokens.json"
          cp "${HOME}/.sima-cli/.tokens.json" "${HOME}/.sima-cli/.token.json"
          test -s "${HOME}/.sima-cli/.tokens.json"
          test -s "${HOME}/.sima-cli/.token.json"

      - name: Verify Docker is available
        run: |
          set -euo pipefail

          docker version
          docker info

      - name: Install smoke test host tools
        run: |
          set -euo pipefail

          if command -v ffmpeg >/dev/null 2>&1; then
            ffmpeg -version | head -3
            exit 0
          fi

          case "${RUNNER_OS}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends ffmpeg
              ;;
            macOS)
              if ! command -v brew >/dev/null 2>&1; then
                echo "Homebrew is required to install ffmpeg on the macOS smoke runner." >&2
                exit 1
              fi
              brew install ffmpeg
              ;;
            *)
              echo "Unsupported runner OS for SDK smoke host tools: ${RUNNER_OS}" >&2
              exit 1
              ;;
          esac

          ffmpeg -version | head -3

      - name: Install SDK image
        env:
          INSTALL_SPEC: ${{ steps.image.outputs.install_spec }}
        run: |
          set -euo pipefail

          source .venv/bin/activate
          sima-cli install "${INSTALL_SPEC}"

      - name: Verify pulled image architecture
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          EXPECTED_ARCH: ${{ matrix.docker_arch }}
        run: |
          set -euo pipefail

          actual_arch="$(docker image inspect "${IMAGE_REF}" --format '{{.Architecture}}')"
          echo "Pulled image architecture: ${actual_arch}"
          test "${actual_arch}" = "${EXPECTED_ARCH}"

      - name: Run SDK setup
        run: |
          set -euo pipefail

          source .venv/bin/activate
          sima-cli sdk setup -y -n --no-model-sdk

      - name: Run SDK smoke test suite
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          set -euo pipefail

          tests/sdk/run-smoke-tests.sh

      - name: Clean up SDK containers
        if: always()
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          if ! docker info >/dev/null 2>&1; then
            exit 0
          fi

          containers=()
          while IFS= read -r container_id; do
            [[ -n "${container_id}" ]] && containers+=("${container_id}")
          done < <(docker ps -aq --filter "ancestor=${IMAGE_REF}")

          container_names=()
          while IFS= read -r name; do
            [[ -n "${name}" ]] && container_names+=("${name}")
          done < <(python3 - "${IMAGE_REF}" "${IMAGE_TAG}" <<'PY'
          import re
          import sys

          image_ref, image_tag = sys.argv[1:3]

          def sanitize(image: str) -> str:
              name = image
              name = re.sub(r"\b(sima-docker)\b", "", name)
              name = re.sub(r"\bartifacts\.eng\.sima\.ai\b", "jfrog", name)
              name = re.sub(r"\b\d+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com\b", "", name)
              name = name.replace("/", "-").replace(":", "-").lower()
              name = re.sub(r"[^a-z0-9_.-]", "_", name)
              name = name.strip("._-").replace("--", "-")
              if not name or not name[0].isalnum():
                  name = f"c_{name}"
              return name[:128]

          candidates = [
              image_ref,
              f"sdk:{image_tag}",
              "sdk:latest",
          ]
          for candidate in dict.fromkeys(sanitize(item) for item in candidates if item):
              print(candidate)
          PY
          )

          for name in "${container_names[@]}"; do
            container_id="$(docker ps -aq --filter "name=^/${name}$" | head -n 1 || true)"
            [[ -n "${container_id}" ]] && containers+=("${container_id}")
          done

          if (( ${#containers[@]} == 0 )); then
            echo "No SDK smoke containers found to clean up."
            exit 0
          fi

          printf '%s\n' "${containers[@]}" | sort -u | while read -r container_id; do
            if [[ -n "${container_id}" ]]; then
              echo "Removing SDK smoke container ${container_id}"
              docker rm -f "${container_id}"
            fi
          done

  promote:
    name: Promote staged image
    if: github.event_name != 'pull_request'
    needs: smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download image metadata
        uses: actions/download-artifact@v7
        with:
          name: image-promotion-metadata
          path: .smoke

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image
        run: |
          set -euo pipefail

          metadata_file="$(find .smoke -type f -name image.env -print -quit)"
          # shellcheck disable=SC1090
          source "${metadata_file}"

          if [[ "${promote_latest}" != "true" && -z "${release_tag}" && -z "${release_latest_tag:-}" ]]; then
            echo "Promotion skipped: no release tag or latest promotion requested."
            exit 0
          fi

          tags=()
          if [[ "${promote_latest}" == "true" ]]; then
            tags+=(--tag "${repository}:latest")
            if [[ -n "${branch_tag:-}" ]]; then
              canonical_sdk_repository="${repository%/*}/sdk"
              tags+=(--tag "${canonical_sdk_repository}:${branch_tag}")
            fi
          fi
          if [[ -n "${release_tag}" ]]; then
            tags+=(--tag "${repository}:${release_tag}")
          fi
          if [[ -n "${release_latest_tag:-}" ]]; then
            tags+=(--tag "${repository}:${release_latest_tag}")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "${source_ref}"

  prepare-vulcan-install-stub:
    name: Prepare SDK install stub package
    if: github.event_name != 'pull_request'
    needs: promote
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download image metadata
        uses: actions/download-artifact@v7
        with:
          name: image-promotion-metadata
          path: .smoke

      - name: Install sima-cli
        run: |
          set -euo pipefail

          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install sima-cli
          SIMA_CLI_CHECK_FOR_UPDATE=0 sima-cli --version

      - name: Prepare SDK install stub package
        run: |
          set -euo pipefail

          metadata_file="$(find .smoke -type f -name image.env -print -quit)"
          # shellcheck disable=SC1090
          source "${metadata_file}"

          if [[ "${promote_latest}" == "true" ]]; then
            canonical_sdk_repository="${repository%/*}/sdk"
            image_resource="ghcr:${canonical_sdk_repository#ghcr.io/}:${branch_tag}"
            package_version="${GITHUB_REF_NAME}"
          elif [[ -n "${release_tag}" ]]; then
            image_resource="ghcr:${repository#ghcr.io/}:${release_tag}"
            package_version="${release_tag#v}"
          else
            echo "SDK install stub skipped: no promoted branch or release image tag." >&2
            exit 1
          fi

          source .venv/bin/activate
          tools/prepare_s3_artifacts.sh \
            --output-dir dist \
            --image-resource "${image_resource}" \
            --version "${package_version}" \
            --release "${GITHUB_SHA}"

      - name: Upload SDK install stub package
        uses: actions/upload-artifact@v7
        with:
          name: sdk-install-stub
          path: dist/
          if-no-files-found: error

  publish-vulcan-install-stub:
    name: Publish SDK install stub to Vulcan
    if: github.event_name != 'pull_request'
    needs: prepare-vulcan-install-stub
    uses: sima-neat/.github/.github/workflows/vulcan-publish-artifacts.yml@main
    with:
      aws_region: us-west-2
      environment_name: ${{ vars.VULCAN_ENV || 'production' }}
      artifact_pattern: sdk-install-stub
      artifact_glob: "**/*"
      min_artifact_count: 2

  mark-vulcan-install-stub-latest:
    name: Mark SDK install stub as latest
    if: github.event_name != 'pull_request'
    needs: publish-vulcan-install-stub
    uses: sima-neat/.github/.github/workflows/vulcan-update-latest-artifacts.yml@main
    with:
      aws_region: us-west-2
      environment_name: ${{ vars.VULCAN_ENV || 'production' }}

  retarget-release-line-install-stub:
    name: Retarget SDK release-line install stub
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-vulcan-install-stub
    runs-on: ubuntu-24.04
    environment: ${{ vars.VULCAN_ENV || 'production' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download image metadata
        uses: actions/download-artifact@v7
        with:
          name: image-promotion-metadata
          path: .smoke

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: ${{ vars.VULCAN_ARTIFACT_PUBLISHER_ROLE_ARN }}
          role-session-name: sdk-retarget-release-line-${{ github.run_id }}

      - name: Retarget release-line metadata to tagged SDK image
        env:
          ARTIFACT_BUCKET: ${{ vars.VULCAN_ARTIFACT_BUCKET }}
          SSE_KMS_KEY_ID: ${{ vars.VULCAN_ARTIFACT_KMS_KEY_ID }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.VULCAN_ARTIFACT_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail

          metadata_file="$(find .smoke -type f -name image.env -print -quit)"
          # shellcheck disable=SC1090
          source "${metadata_file}"

          if [[ -z "${release_line_ref:-}" ]]; then
            echo "release_line_ref is required for release-line install stub retargeting." >&2
            exit 1
          fi
          if [[ -z "${release_tag:-}" ]]; then
            echo "release_tag is required for release-line install stub retargeting." >&2
            exit 1
          fi
          if [[ -z "${ARTIFACT_BUCKET:-}" ]]; then
            echo "VULCAN_ARTIFACT_BUCKET is required." >&2
            exit 1
          fi
          release_image_resource="ghcr:${repository#ghcr.io/}:${release_tag}"

          tools/retarget_release_line_metadata.py \
            --bucket "${ARTIFACT_BUCKET}" \
            --repository sdk \
            --release-line-ref "${release_line_ref}" \
            --image-resource "${release_image_resource}" \
            --sse-kms-key-id "${SSE_KMS_KEY_ID:-}" \
            --cloudfront-distribution-id "${CLOUDFRONT_DISTRIBUTION_ID:-}"
